{{- if semverCompare ">=1.21-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: batch/v1
{{- else -}}
apiVersion: batch/v1beta1
{{- end }}
kind: Job
metadata:
  name: {{ template "fireFlyCollectorOffBoarderJob" . }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded, hook-failed
spec:
  backoffLimit: 2
  template:
    metadata:
      name: "off-boarder"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: integration-deletion
          image: "{{ .Values.offBoarderImage.repository }}:{{ .Values.offBoarderImage.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- if .Values.resources }}
          resources:
{{- toYaml .Values.resources | nindent 12 }}
{{- end }}
          env:
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "fireFlyCredentialsSecret" . }}
                  key: accessKey
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "fireFlyCredentialsSecret" . }}
                  key: secretKey
            - name: CLUSTER_ID
              value: {{ .Values.clusterId }}
            - name: APP_API_URL
              value: {{ .Values.appApiEndpoint }}
            - name: INTEGRATION_FLOW
              value: "OFF_BOARD"
